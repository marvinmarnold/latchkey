services:
  proxy:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - proxy-data:/app/data
    environment:
      PORT: 3000
      DB_PATH: /app/data/payprompt.db
      NODE_ENV: production
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    restart: unless-stopped

volumes:
  proxy-data:
